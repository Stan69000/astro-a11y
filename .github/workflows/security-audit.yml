name: Security Audit

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level moderate
