name: Bug report
description: Report a reproducible bug
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps and commands
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: v22.x
    validations:
      required: true
  - type: input
    id: pnpm
    attributes:
      label: pnpm version
      placeholder: 10.x
    validations:
      required: true
